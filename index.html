<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>~/portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #0f1218;
    --border: #1e2530;
    --green: #00ff88;
    --green-dim: #00cc6a;
    --cyan: #00d4ff;
    --yellow: #ffd700;
    --red: #ff4757;
    --purple: #b57bee;
    --orange: #ff8c42;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --text-bright: #e6edf3;
    --prompt-color: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,255,136,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 80% 80%, rgba(0,212,255,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .terminal-window {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 
      0 0 0 1px rgba(0,255,136,0.05),
      0 24px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(0,255,136,0.03);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .terminal-titlebar {
    background: #131820;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28c840; }

  .terminal-title {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    margin-right: auto;
    letter-spacing: 0.05em;
  }

  /* Mobile keyboard toggle button */
  .keyboard-toggle {
    display: none;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 5px;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .terminal-body {
    padding: 16px 20px;
    min-height: 380px;
    max-height: 65vh;
    overflow-y: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .terminal-body::-webkit-scrollbar { width: 4px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .line {
    line-height: 1.7;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .line + .line { margin-top: 1px; }

  .prompt-line {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .prompt {
    color: var(--green);
    flex-shrink: 0;
    font-size: 13px;
    white-space: nowrap;
  }

  .prompt .user { color: var(--cyan); }
  .prompt .at { color: var(--text-dim); }
  .prompt .host { color: var(--purple); }
  .prompt .path { color: var(--yellow); }
  .prompt .arrow { color: var(--green); }

  #input-line {
    display: flex;
    align-items: center;
    margin-top: 12px;
    cursor: text;
  }

  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    flex: 1;
    caret-color: var(--green);
    padding: 0;
    margin-left: 2px;
    /* Prevent iOS zoom on input focus */
    font-size: max(13px, 16px);
  }

  /* Scale down after focus to avoid layout shift */
  @media (max-width: 600px) {
    #cmd-input { font-size: 16px; }
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--green);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 1px;
    border-radius: 1px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Output styles */
  .c-green { color: var(--green); }
  .c-cyan { color: var(--cyan); }
  .c-yellow { color: var(--yellow); }
  .c-red { color: var(--red); }
  .c-purple { color: var(--purple); }
  .c-orange { color: var(--orange); }
  .c-dim { color: var(--text-dim); }
  .c-bright { color: var(--text-bright); }
  .c-white { color: #fff; }

  .bold { font-weight: 700; }
  .indent { padding-left: 20px; }
  .indent2 { padding-left: 40px; }

  .section-header {
    color: var(--cyan);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(0,212,255,0.2);
    padding-bottom: 4px;
    margin-bottom: 8px;
    margin-top: 4px;
  }

  .tag {
    display: inline-block;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    color: var(--green);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin: 2px 2px;
  }

  .tag.blue {
    background: rgba(0,212,255,0.08);
    border-color: rgba(0,212,255,0.2);
    color: var(--cyan);
  }

  .tag.yellow {
    background: rgba(255,215,0,0.08);
    border-color: rgba(255,215,0,0.2);
    color: var(--yellow);
  }

  .tag.purple {
    background: rgba(181,123,238,0.08);
    border-color: rgba(181,123,238,0.2);
    color: var(--purple);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .metric {
    color: var(--orange);
    font-weight: 700;
  }

  .ascii-art {
    color: var(--green);
    font-size: 11px;
    line-height: 1.3;
    opacity: 0.7;
  }

  .help-cmd {
    display: inline-block;
    min-width: 200px;
    color: var(--yellow);
    font-weight: 500;
  }

  .fade-in {
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Recruiter hint panel ── */
  .hint-panel {
    width: 100%;
    max-width: 860px;
    margin-top: 12px;
    background: rgba(15,18,24,0.92);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 10px;
    padding: 12px 16px 12px;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(6px);
    flex-shrink: 0;
  }

  .hint-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cyan);
    opacity: 0.7;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .hint-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0.6;
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  .hint-label .dismiss {
    margin-left: auto;
    cursor: pointer;
    opacity: 0.4;
    font-size: 11px;
    transition: opacity 0.2s;
    color: var(--text-dim);
    user-select: none;
  }
  .hint-label .dismiss:hover { opacity: 0.9; }

  .hint-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 7px;
  }

  .hint-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--text-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .hint-btn:hover, .hint-btn:active {
    background: rgba(0,212,255,0.07);
    border-color: rgba(0,212,255,0.3);
    color: #fff;
  }

  .hint-btn .btn-icon {
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
  }

  .hint-btn .btn-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hint-btn .btn-cmd {
    color: var(--yellow);
    font-size: 10px;
    opacity: 0.5;
    flex-shrink: 0;
    display: none; /* hidden on mobile to save space */
  }

  .hint-panel.hidden { display: none; }

  /* ── ASCII art: hidden on very small screens ── */
  .ascii-hide-mobile { display: block; }

  /* ── Responsive breakpoints ── */
  @media (max-width: 700px) {
    body { padding: 10px 10px 16px; }

    .ascii-hide-mobile { display: none; }

    .terminal-body {
      padding: 12px 14px;
      max-height: 55vh;
      min-height: 300px;
    }

    .line, .prompt, #cmd-input {
      font-size: 12.5px;
    }

    .section-header { font-size: 9.5px; }
    .tag { font-size: 9.5px; padding: 1px 5px; }

    .help-cmd { min-width: 160px; }

    .keyboard-toggle { display: inline-flex; align-items: center; }

    .hint-buttons {
      grid-template-columns: repeat(2, 1fr);
    }

    .hint-btn { font-size: 11px; padding: 9px 10px; }
  }

  @media (max-width: 400px) {
    .hint-buttons {
      grid-template-columns: 1fr 1fr;
    }
    .hint-btn { font-size: 10.5px; padding: 8px 8px; gap: 5px; }
    .terminal-title { font-size: 10px; }
  }

  /* When virtual keyboard is open (approximated via viewport height) */
  @media (max-height: 500px) {
    .terminal-body { max-height: 40vh; }
  }
</style>
</head>

function printLine(html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'line fade-in';
      div.innerHTML = html;
      output.appendChild(div);
      body.scrollTop = body.scrollHeight;
      resolve();
    }, delay);
  });
}

async function runBootSequence() {
  for (const item of BOOT_SEQUENCE) {
    await printLine(item.text, item.delay);
  }
}

async function runCommand(cmd) {
  const trimmed = cmd.trim().toLowerCase();

  const echoDiv = document.createElement('div');
  echoDiv.className = 'line prompt-line';
  echoDiv.innerHTML = `<span class="prompt"><span class="user">visitor</span><span class="at">@</span><span class="host">portfolio</span><span style="color:var(--text-dim)">:</span><span class="path">${pathEl.textContent}</span><span class="arrow">$ </span></span><span class="c-bright">${escHtml(cmd)}</span>`;
  output.appendChild(echoDiv);

  if (!trimmed) return;

  let handler = COMMANDS[trimmed];

  if (handler) {
    const lines = handler();
    for (const line of lines) {
      await printLine(line, 16);
    }
  } else {
    await printLine(`  <span class="c-red">bash: ${escHtml(trimmed)}: command not found.</span>  <span class="c-dim">Try</span> <span class="c-yellow">help</span>`, 0);
    await printLine(``, 0);
  }

  body.scrollTop = body.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

input.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    if (val.trim()) { cmdHistory.unshift(val); histIdx = -1; }
    await runCommand(val);
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = cmdHistory[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.toLowerCase();
    const allCmds = Object.keys(COMMANDS).concat(['help','whoami','clear','ls']);
    const match = allCmds.find(c => c.startsWith(val) && c !== val);
    if (match) input.value = match;
  }
});

// Mobile: tap terminal body to focus input
document.getElementById('terminal-body').addEventListener('click', (e) => {
  // Don't steal focus from links/buttons
  if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON') {
    input.focus();
  }
});

// Keyboard toggle button (mobile)
kbToggle.addEventListener('click', () => {
  input.focus();
  // Scroll terminal to bottom to show input above keyboard
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 300);
});

// When input is focused on mobile, scroll the page to keep input in view
input.addEventListener('focus', () => {
  setTimeout(() => {
    body.scrollTop = body.scrollHeight;
    document.getElementById('input-line').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 350);
});

// Hint panel buttons
document.querySelectorAll('.hint-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const cmd = btn.getAttribute('data-cmd');
    btn.style.borderColor = 'rgba(0,255,136,0.5)';
    btn.style.background = 'rgba(0,255,136,0.06)';
    setTimeout(() => { btn.style.borderColor = ''; btn.style.background = ''; }, 400);
    // On mobile, scroll terminal into view first
    document.querySelector('.terminal-window').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    input.value = '';
    if (cmd.trim()) { cmdHistory.unshift(cmd); histIdx = -1; }
    await runCommand(cmd);
  });
});

document.getElementById('dismiss-hint').addEventListener('click', () => {
  const panel = document.getElementById('hint-panel');
  panel.style.opacity = '0';
  panel.style.transform = 'translateY(6px)';
  panel.style.transition = 'opacity 0.3s, transform 0.3s';
  setTimeout(() => panel.classList.add('hidden'), 300);
});

// Boot
